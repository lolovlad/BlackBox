<section class="card">
    <p class="hint">Записей для графика: {{ row_count }}</p>
    <div id="echarts-main" style="height: 520px; width: 100%;"></div>
</section>
<script>
(function () {
    var el = document.getElementById('echarts-main');
    if (!el || typeof echarts === 'undefined') return;
    var chart = echarts.init(el);
    var option = {
        tooltip: { trigger: 'axis' },
        legend: { type: 'scroll' },
        grid: { left: 45, right: 25, top: 45, bottom: 90 },
        xAxis: { type: 'category', data: {{ x_axis|tojson }}, boundaryGap: false },
        yAxis: { type: 'value' },
        dataZoom: [
            { type: 'inside', xAxisIndex: 0, filterMode: 'none' },
            { type: 'slider', xAxisIndex: 0, height: 24, bottom: 18 }
        ],
        series: {{ series|tojson }}
    };
    chart.setOption(option);
    window.addEventListener('resize', function () { chart.resize(); });
})();
</script>
