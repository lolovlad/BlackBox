{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<section class="card dashboard-page">
    <h2>Главная панель</h2>
    <form id="dashboard-live-form" class="dashboard-controls" onsubmit="return false;" lang="ru">
        <input type="hidden" name="analog_off_b64" id="dashboard-analog-off-b64" value="">
        <input type="hidden" name="discrete_off_b64" id="dashboard-discrete-off-b64" value="">
        <fieldset>
            <legend>Поля аналогов</legend>
            <div class="checkbox-grid">
                {% for key, ru in analog_options %}
                    <label class="chk"><input type="checkbox" data-col-group="analog" value="{{ key }}" checked> {{ ru }}</label>
                {% endfor %}
            </div>
        </fieldset>
        <fieldset>
            <legend>Поля дискретов</legend>
            <div class="checkbox-grid">
                {% for key, ru in discrete_options %}
                    <label class="chk"><input type="checkbox" data-col-group="discrete" value="{{ key }}" checked> {{ ru }}</label>
                {% endfor %}
            </div>
        </fieldset>
    </form>

    <div id="dashboard-live-root"
         hx-get="{{ url_for('main_blueprint.dashboard_live') }}"
         hx-include="#dashboard-live-form"
         hx-trigger="load, every 2s, change from:#dashboard-live-form"
         hx-swap="innerHTML">
        <p class="tab-panel-placeholder">Загрузка данных...</p>
    </div>

    <p><a class="btn" href="{{ url_for('data_blueprint.page') }}">Открыть расширенные таблицы</a></p>
</section>
<script>
(() => {
    const form = document.getElementById("dashboard-live-form");
    const analogOff = document.getElementById("dashboard-analog-off-b64");
    const discreteOff = document.getElementById("dashboard-discrete-off-b64");
    if (!form || !analogOff || !discreteOff) {
        return;
    }

    const encodeUnchecked = (group) => {
        const unchecked = [];
        form.querySelectorAll('input[type="checkbox"][data-col-group="' + group + '"]').forEach((el) => {
            if (!el.checked) {
                unchecked.push(el.value);
            }
        });
        if (!unchecked.length) {
            return "";
        }
        // URL-safe base64 without padding.
        return btoa(unescape(encodeURIComponent(JSON.stringify(unchecked))))
            .replace(/\+/g, "-")
            .replace(/\//g, "_")
            .replace(/=+$/g, "");
    };

    const syncEncodedFilters = () => {
        analogOff.value = encodeUnchecked("analog");
        discreteOff.value = encodeUnchecked("discrete");
    };

    form.addEventListener("change", syncEncodedFilters);
    document.body.addEventListener("htmx:configRequest", (evt) => {
        if (evt.detail && evt.detail.elt && evt.detail.elt.id === "dashboard-live-root") {
            syncEncodedFilters();
        }
    });
    syncEncodedFilters();
})();
</script>
{% endblock %}
