<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/tailwind.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="min-h-screen bg-gray-100 text-gray-800 antialiased">
<main class="grid min-h-screen place-items-center p-4">
    <section class="w-full max-w-md rounded-2xl border border-gray-200 bg-white p-6 shadow-xl card">
        <h2 class="mb-5 text-2xl font-semibold tracking-tight">Вход в систему</h2>
        <form method="post">
            {{ form.hidden_tag() }}
            <label class="mb-3 block text-sm font-medium text-gray-700">
                <span class="mb-1 block">{{ form.username.label.text }}</span>
                {{ form.username(class_="w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500") }}
            </label>
            <label class="mb-5 block text-sm font-medium text-gray-700">
                <span class="mb-1 block">{{ form.password.label.text }}</span>
                {{ form.password(class_="w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500") }}
            </label>
            {{ form.submit(class_="inline-flex w-full items-center justify-center rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-700") }}
        </form>
    </section>
</main>
</body>
</html>
